# Phase 2 super-resolution config (TIR 200 m -> 100 m, 2x).
seed: 42
manifest: data/processed/manifest.csv
out_dir: checkpoints/sr
device: auto            # auto | cpu | cuda

# Model (swappable): edsr | swinir
model:
  name: edsr
  scale: 2
  num_features: 64
  num_blocks: 8
  res_scale: 1.0

# Normalization (brightness-temperature Kelvin). 'auto' computes from train split.
tir_mean: auto
tir_std: auto

# Losses — fidelity-first to limit hallucination.
loss:
  charbonnier: 1.0
  perceptual: 0.0       # VGG perceptual (set >0 to enable)
  adversarial: 0.0      # keep low/zero for radiometric fidelity
  physics_consistency: 0.1   # downsample(SR) must reproduce LR

# Training.
train:
  epochs: 50
  batch_size: 16
  lr: 0.0002
  num_workers: 2
  augment: true
  val_every: 1
  max_steps: null       # cap steps for smoke tests (CLI --max-steps overrides)
